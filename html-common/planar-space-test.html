<!doctype html>
<html lang="en">
<head>
	<title>Planar space test</title>
	<meta charset="utf-8">
	<link rel="icon" href="../favicon.svg">
	<link rel="stylesheet" href="../[common]/common-style.css">
	<script type="module" src="../[html-common]/script/colourScheme-selector.js"></script>
</head>
<body>
	<header>
		<h1><a href="">Planar space test</a></h1>
		<nav>
			<a class="colourScheme-selector" href="?colourScheme=light" title="Light colour scheme" data-colourscheme="light">🟓</a>
			<a class="colourScheme-selector" href="?colourScheme=dark" title="Dark colour scheme" data-colourscheme="dark">🟒</a>
			<a title="To folder" href="./">🖿</a>
			<a title="Parent folder" href="../">🡅</a>
		</nav>
	</header>

	<link rel="stylesheet" href="../[html-common]/style/testing.css">

	<main>


		<details name="test_set">
			<summary>Preconfigured space tests</summary>
			<script type="module" title="Preconfigured space tests">
				console.info('preconfigured space setting tests');

				import * as test from '../[html-common]/testing/testing.js';
				import * as predicate from '../[html-common]/testing/predicate.js';
				import * as ps from '../[html-common]/module/PlanarSpace.js'

				let output = '';
				function mat2(x,y) { return Math.atan2(y,x); }


				console.groupCollapsed('Setup default (navigational) planar space');
					let nps = new ps.Space(undefined, 'default planar space');
					console.log('nps:', nps);

					let np = nps.newPoint(nps.newCartesianCoordinates(77,77), 'test point');
					console.log('np:', np.cartesian, np);

				console.groupEnd();


				const t1 = new test.Test(
					'Default (navigational) quadrant test',
					new predicate.AllEqual(),
					[
						[	0,		np.setCartesian(0,77).polar.angle.degrees],
						[	45,		np.setCartesian(77,77).polar.angle.degrees],
						[	90,		np.setCartesian(77,0).polar.angle.degrees],
						[	135,	np.setCartesian(77,-77).polar.angle.degrees],
						[	-45,	np.setCartesian(-77,77).polar.angle.degrees],
						[	-90,	np.setCartesian(-77,0).polar.angle.degrees],
						[	-135,	np.setCartesian(-77,-77).polar.angle.degrees]
					]
				);
				t1.toConsole();
				output += t1.toHTML();


				console.groupCollapsed('Setup planar space - maths conventions');

					let mps = new ps.Space(ps.settings_maths, 'Planar space using maths conventions');
					console.log('mps', mps);

					let mp = mps.newPoint().setCartesian(15,20);
					console.log('mp', mp);

				console.groupEnd();


				const t2 = new test.Test(
					'Maths conventions quadrant test',
					new predicate.AllEqual(),
					[
						[	0,		mp.setCartesian(77,0).polar.angle.degrees],
						[	45,		mp.setCartesian(77,77).polar.angle.degrees],
						[	90,		mp.setCartesian(0,77).polar.angle.degrees],
						[	135,	mp.setCartesian(-77,77).polar.angle.degrees],
						[	-45,	mp.setCartesian(77,-77).polar.angle.degrees],
						[	-90,	mp.setCartesian(0,-77).polar.angle.degrees],
						[	-135,	mp.setCartesian(-77,-77).polar.angle.degrees]
					]
				);
				t2.toConsole();
				output += t2.toHTML();

				const t3 = new test.Test(
					'Maths conventions should be the same as atan2',
					new predicate.AllEqual(),
					[
						[	mat2(77,0),		mp.setCartesian(77,0).polar.angle.radians],
						[	mat2(77,77),	mp.setCartesian(77,77).polar.angle.radians],
						[	mat2(0,77),		mp.setCartesian(0,77).polar.angle.radians],
						[	mat2(-77,77),	mp.setCartesian(-77,77).polar.angle.radians],
						[	mat2(77,-77),	mp.setCartesian(77,-77).polar.angle.radians],
						[	mat2(0,-77),	mp.setCartesian(0,-77).polar.angle.radians],
						[	mat2(-77,-77),	mp.setCartesian(-77,-77).polar.angle.radians]
					]
				);
				t3.toConsole();
				output += t3.toHTML();

				document.getElementById('output_pstr').innerHTML = output;
			</script>
		</details>


		<section>
			<h3>Preconfigured space test results</h3>

			<output id="output_pstr">

			</output>
		</section>



		<details name="test_set" class="fullwidth" open>
			<summary>Custom space tests - clockwise (navigation) variants</summary>

			<script type="module"  title="Custom space tests">
				console.info('Custom space tests - clockwise (navigation) variants');
				import * as test from '../[html-common]/testing/testing.js';
				import * as predicate from '../[html-common]/testing/predicate.js';
				import * as ps from '../[html-common]/module/PlanarSpace.js'

				console.groupCollapsed('Setup navigation variant 1 - Polar axis right, clockwise');
					const nv1 = new ps.Space(
						{ polarAxis:'right', polarDirection: 'clockwise' },
						'Polar axis right, clockwise'
					);
					const nv1p = nv1.newPoint().setCartesian(11,22);
					console.log('nv1p', nv1p);
				console.groupEnd();

				new test.Test(
					'Test: navigation variant 1 - Polar axis right, clockwise',
					new predicate.AllEqual(),
					[
						[	0,		nv1p.setCartesian(77,0).polar.angle.degrees],
						[	45,		nv1p.setCartesian(77,-77).polar.angle.degrees],
						[	90,		nv1p.setCartesian(0,-77).polar.angle.degrees],
						[	135,	nv1p.setCartesian(-77,-77).polar.angle.degrees],
						[	-45,	nv1p.setCartesian(77,77).polar.angle.degrees],
						[	-90,	nv1p.setCartesian(0,77).polar.angle.degrees],
						[	-135,	nv1p.setCartesian(-77,77).polar.angle.degrees]
					]
				).toConsole();

				console.groupCollapsed('Setup navigation variant 2 - Polar axis down, clockwise');
					const nv2 = new ps.Space(
						{ polarAxis:'down', polarDirection: 'clockwise' },
						'Polar axis down, clockwise'
					);
					const nv2p = nv2.newPoint().setCartesian(22,33);
					console.log('nv2p', nv2p);
				console.groupEnd();

				new test.Test(
					'Test: navigation variant 2 - Polar axis down, clockwise',
					new predicate.AllEqual(),
					[
						[	0,		nv2p.setCartesian(0,-77).polar.angle.degrees],
						[	45,		nv2p.setCartesian(-77,-77).polar.angle.degrees],
						[	90,		nv2p.setCartesian(-77,0).polar.angle.degrees],
						[	135,	nv2p.setCartesian(-77,77).polar.angle.degrees],
						[	-45,	nv2p.setCartesian(77,-77).polar.angle.degrees],
						[	-90,	nv2p.setCartesian(77,0).polar.angle.degrees],
						[	-135,	nv2p.setCartesian(77,77).polar.angle.degrees]
					]
				).toConsole();

				/* 				 */

				console.groupCollapsed('Test: navigation variant 3 - Polar axis left, clockwise');
					const nv3 = new ps.Space(
						{ polarAxis:'left', polarDirection: 'clockwise' },
						'Polar axis left, clockwise'
					);
					const nv3p = nv3.newPoint().setCartesian(33,44);
					console.log('nv3p', nv3p);
				console.groupEnd();

				new test.Test(
					'Test: navigation variant 3 - Polar axis left, clockwise',
					new predicate.AllEqual(),
					[
						[	0,		nv3p.setCartesian(-77,0).polar.angle.degrees],
						[	45,		nv3p.setCartesian(-77,77).polar.angle.degrees],
						[	90,		nv3p.setCartesian(0,77).polar.angle.degrees],
						[	135,	nv3p.setCartesian(77,77).polar.angle.degrees],
						[	-45,	nv3p.setCartesian(-77,-77).polar.angle.degrees],
						[	-90,	nv3p.setCartesian(0,-77).polar.angle.degrees],
						[	-135,	nv3p.setCartesian(77,-77).polar.angle.degrees]
					]
				).toConsole();

			</script>
		</details>


		<details name="test_set" class="fullwidth" open>
			<summary>Custom space tests - anticlockwise (maths) variants</summary>

			<script type="module"  title="Custom space tests">
				console.info('Custom space tests - anticlockwise (maths) variants');
				import * as test from '../[html-common]/testing/testing.js';
				import * as predicate from '../[html-common]/testing/predicate.js';
				import * as ps from '../[html-common]/module/PlanarSpace.js'

				console.groupCollapsed('Setup maths variant 1 - Polar axis up, anticlockwise');
					const mv1 = new ps.Space(
						{ polarAxis:'up', polarDirection: 'anticlockwise' },
						'Polar axis up, anticlockwise'
					);
					const mv1p = mv1.newPoint().setCartesian(11,11);
					console.log('mv1p', mv1p);
				console.groupEnd();

				new test.Test(
					'Test: maths variant 1 - Polar axis up, anticlockwise',
					new predicate.AllEqual(),
					[
						[	0,		mv1p.setCartesian(0,77).polar.angle.degrees],
						[	45,		mv1p.setCartesian(-77,77).polar.angle.degrees],
						[	90,		mv1p.setCartesian(-77,0).polar.angle.degrees],
						[	135,	mv1p.setCartesian(-77,-77).polar.angle.degrees],
						[	-45,	mv1p.setCartesian(77,77).polar.angle.degrees],
						[	-90,	mv1p.setCartesian(77,0).polar.angle.degrees],
						[	-135,	mv1p.setCartesian(77,-77).polar.angle.degrees]
					]
				).toConsole();

				console.groupCollapsed('Setup maths variant 2 - Polar axis left, anticlockwise');
					const mv2 = new ps.Space(
						{ polarAxis:'left', polarDirection: 'anticlockwise' },
						'Polar axis left, anticlockwise'
					);
					const mv2p = mv2.newPoint().setCartesian(22,22);
					console.log('mv2p', mv2p);
				console.groupEnd();

				new test.Test(
					'Test: maths variant 2 - Polar axis left, anticlockwise',
					new predicate.AllEqual(),
					[
						[	0,		mv2p.setCartesian(-77,0).polar.angle.degrees],
						[	45,		mv2p.setCartesian(-77,-77).polar.angle.degrees],
						[	90,		mv2p.setCartesian(0,-77).polar.angle.degrees],
						[	135,	mv2p.setCartesian(77,-77).polar.angle.degrees],
						[	-45,	mv2p.setCartesian(-77,77).polar.angle.degrees],
						[	-90,	mv2p.setCartesian(0,77).polar.angle.degrees],
						[	-135,	mv2p.setCartesian(77,77).polar.angle.degrees]
					]
				).toConsole();


				console.groupCollapsed('Setup maths variant 3 - Polar axis down, anticlockwise');
					const mv3 = new ps.Space(
						{ polarAxis:'down', polarDirection: 'anticlockwise' },
						'Polar axis down, anticlockwise'
					);
					const mv3p = mv3.newPoint().setCartesian(22,22);
					console.log('mv3p', mv3p);
				console.groupEnd();

				new test.Test(
					'Test: maths variant 3 - Polar axis down, anticlockwise',
					new predicate.AllEqual(),
					[
						[	0,		mv3p.setCartesian(0,-77).polar.angle.degrees],
						[	45,		mv3p.setCartesian(77,-77).polar.angle.degrees],
						[	90,		mv3p.setCartesian(77,0).polar.angle.degrees],
						[	135,	mv3p.setCartesian(77,77).polar.angle.degrees],
						[	-45,	mv3p.setCartesian(-77,-77).polar.angle.degrees],
						[	-90,	mv3p.setCartesian(-77,0).polar.angle.degrees],
						[	-135,	mv3p.setCartesian(-77,77).polar.angle.degrees]
					]
				).toConsole();

			</script>
		</details>


	</main>

</body>
</html>
