<!doctype html>
<html lang="en">
<head>
	<title>alphabet</title>
	<meta charset="utf-8">
	<link rel="icon" href="../[common]/html-experiment.svg">
	<link rel="stylesheet" href="../[common]/common-style.css">
	<script defer src="../[common]/common-script.js"></script>

</head>
<body onload="updateOutput()">
	<header>
		<h1><a href="">alphabet</a></h1>
		<nav>
			<a class="colourScheme-selector" href="?colourScheme=light" title="Light colour scheme" data-colourscheme="light">🟓</a>
			<a class="colourScheme-selector" href="?colourScheme=dark" title="Dark colour scheme" data-colourscheme="dark">🟒</a>
			<a title="To folder" href="./">🖿</a>
			<a title="Parent folder" href="../">🡅</a>
		</nav>

	</header>

	<main>

	<form id="output" onchange="updateOutput()">

			<label>Alphabet:</label>
			<input type="text" id="input-alphabet" value="abcdefghijklmnopqrstuvwxyz">

			<label>Width:</label>
			<input type="number" id="input-width" value="5">


	</form>
	<output >
		<h2>Result:</h2>
		<div id="the-output"></div>

	</output>

	<script>


		function updateOutput() {

			const alphabet = document.getElementById('input-alphabet').value.split('');
			const width = parseInt(document.getElementById('input-width').value);

			let result = '';
			let index = 0;

			for (let r = 0; r < Math.ceil(alphabet.length / width); r++)
			{
				result += '<div>';
				for (let c = 0; c < width; c++)
				{
					index = c + r*width ;
					result += `<span title="alphabet:${index+1} [${index}] (${r},${c})">${alphabet[index]||''}</span>`;
				}
				result += '</div>';
			}

			document.getElementById('the-output').innerHTML = result;
		}


	</script>
	<style>
		input[type=text] { width:90%; }
		input[type=number] { text-align:center; }
		#the-output {
			font-family:monospace;
			font-size:2em;
			line-height: 3ex;
			span {
				display:inline-block;
				width:2em;
			}

		}
		label {display:block;}
	</style>

	<pre>

		abc
		def
		ghi
		jkl
		mno
		pqr
		stu
		vwx
		yz

		abcd
		efgh
		ijkl
		mnop
		qrst
		uvwx
		yz

		abcde
		fghij
		klmno
		pqrst
		uvwxy
		z

		abcdef
		ghijkl
		mnopqr
		stuvwx
		yz

		abcdefg
		hijklmn
		opqrstu
		vwxyz


	</pre>



	</main>

</body>
</html>
