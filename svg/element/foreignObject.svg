<svg xmlns="http://www.w3.org/2000/svg" viewBox="-1200 -1200 2400 2400" preserveAspectRatio="xMidYMid meet">
	<title>foreignObject</title>
	<use href="../[library]/grid.svg#grid" x="0" y="0"/>

	<style>

		circle {
			stroke: cyan;
			fill: cadetblue;
		}

		rect {
			stroke: red;
			fill: pink;
		}

		text {
			fill: tan;
			stroke: tomato;
			font-size: 32em;
			text-anchor: middle;
		}

		foreignObject {		/* doesn't work?? */
			fill: tan;
			stroke: tomato;
			font-size: 3em;
		}

		div {				/* can do this though */
			border: 1ex dotted dodgerblue;

		}
	</style>


	<g>
		<circle cx="-300" cy="0" r="600" />
		<rect x="0" y="0" width="600" height="900" />
		<text x="50" y="50" >
			foreignObject
		</text>
	</g>

	<!-- Common use case: embed HTML text into SVG -->
	<foreignObject x="200" y="-600" width="700" height="800"><!-- can't put the namespace here -->
		<!--
			In the context of SVG embedded in an HTML document, the XHTML
			namespace could be omitted, but it is mandatory in the
			context of an SVG document
		-->
		<div xmlns="http://www.w3.org/1999/xhtml">
			Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed mollis mollis
			mi ut ultricies. Nullam magna ipsum, porta vel dui convallis, rutrum
			imperdiet eros. Aliquam erat volutpat.

			<p>this is a paragraph</p> <!-- doesn't need namespace -->

		</div>
	</foreignObject>


	<foreignObject x="1000" y="-1000" width="700" height="800" >

		<nav xmlns="http://www.w3.org/1999/xhtml">
			<a class="colourScheme-selector" href="?colourScheme=light" title="Light colour scheme" data-colourscheme="light">🟓</a>
			<a class="colourScheme-selector" href="?colourScheme=dark" title="Dark colour scheme" data-colourscheme="dark">🟒</a>
			<a title="To folder" href="./">🖿</a>
			<a title="Parent folder" href="../">🡅</a>
		</nav>

	</foreignObject>



</svg>