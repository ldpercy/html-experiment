<svg xmlns="http://www.w3.org/2000/svg" viewBox="-32 -32 64 64" preserveAspectRatio="xMidYMid meet">
	<title>path - bezier quadratic</title>

	<line x1="-32" y1="0" x2="32" y2="0"/>
	<line x1="0" y1="-32" x2="0" y2="32"/>

	<style>
		@supports (sibling-index()) {
			line { stroke:magenta; }
		}

		line {
			stroke:teal;
			stroke-dasharray: 10px 10px;
			stroke-dashoffset: 8px;
		}

		.bezier {
			--fill-colour: orange;
			--stroke-colour: blue;

			--sibling-count:5;
			stroke-width:0.5px;

			fill-opacity:55%;

			path {
				--index: sibling-index();
				--count: sibling-count();
				--deg : calc(360 * var(--index,--sibling-index)  / var(--count,--sibling-count));
				--frc : calc(sibling-index() / sibling-count());
				/* --deg : calc(360 * sibling-index()  / sibling-count()); */
				fill:	lch(from var(--fill-colour)		l c calc(h + var(--deg)) / var(--frc));
				stroke:	lch(from var(--stroke-colour)	l c calc(h + var(--deg)) / var(--frc));
			}
		}
	</style>

	<g class="bezier">
		<!--
		<path style="--sibling-index:1;" d="M -30,-10  T 7,-1 5,1 T -5,5 -10,30 "/>
		<path style="--sibling-index:2;" d="M -20,-20  T 7,-1 5,1 T -2,5 -20,20 "/>
		<path style="--sibling-index:3;" d="M -10,-30  T 7,-1 5,1 T -3,5 -30,10 "/>
		-->

		<!--	M 0,25  Q 8,-4 -8,-4 T 0,25 	-->


		<path style="--sibling-index:1;" d="M 0,0  Q -11,-11 0,-10  T 22,-22 11,11 "/>

		<path style="--sibling-index:2;" d="M 0,0  Q  -11,-22 0,0 "/>

		<path style="--sibling-index:5;" d="M 0,0  Q -5,5 -13,-3 Q -11,-22 0,0"/>
		<path style="--sibling-index:5;" d="M 0,0  Q -5,5 -13,-3 T  0,0 z"/>
		<!-- T -11,-22 0,0  -->

	</g>

</svg>