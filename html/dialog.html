
<!doctype html>
<html lang="en">
<head>
	<title>dialog</title>
	<meta charset="utf-8">
	<link rel="icon" href="../favicon.svg">
	<link rel="stylesheet" href="../[common]/common-style.css">
	<script type="module" src="../[html-common]/script/colourScheme-selector.js"></script>
</head>
<body>
	<header>
		<h1>dialog</h1>
		<nav>
			<a class="colourScheme-selector" href="?colourScheme=light" title="Light colour scheme" data-colourscheme="light">🟓</a>
			<a class="colourScheme-selector" href="?colourScheme=dark" title="Dark colour scheme" data-colourscheme="dark">🟒</a>
			<a title="To folder" href="./">🖿</a>
			<a title="Parent folder" href="../">🡅</a>
		</nav>
	</header>

	<main>
		<style>
			::backdrop {
				backdrop-filter: blur(10px);
				background-image: linear-gradient(
					45deg,
					magenta,
					rebeccapurple,
					dodgerblue,
					green
				);
				opacity: 0.75;

			}

			dialog {
				opacity: 0.8;

			}

		</style>

		<form>
			<button type="button" onclick="document.getElementById('dialog1').show()">
				dialog show
			</button>

			<button type="button" onclick="document.getElementById('dialog1').showModal()">
				dialog showModal
			</button>
		</form>



	</main>

	<dialog id="dialog1"> <!-- open -->
		<p>dialog1: Greetings, one and all!</p>
		<form method="dialog">
			<button>OK</button>
		</form>
	</dialog>


	<dialog id="dialog2">
		<p>dialog2: Greetings, one and all!</p>
		<form method="dialog">
			<button>OK</button>
		</form>
	</dialog>


</body>
</html>
