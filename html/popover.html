
<!doctype html>
<html lang="en">
<head>
	<title>popover</title>
	<meta charset="utf-8">
	<link rel="icon" href="../favicon.svg">
	<link rel="stylesheet" href="../[common]/common-style.css">
	<script type="module" src="../[html-common]/script/colourScheme-selector.js"></script>
</head>
<body>
	<header>
		<h1><a href="">Popover</a></h1>
		<nav>
			<a class="colourScheme-selector" href="?colourScheme=light" title="Light colour scheme" data-colourscheme="light">🟓</a>
			<a class="colourScheme-selector" href="?colourScheme=dark" title="Dark colour scheme" data-colourscheme="dark">🟒</a>
			<a title="To folder" href="./">🖿</a>
			<a title="Parent folder" href="../">🡅</a>
		</nav>
	</header>


	<main>

	<style contenteditable="plaintext-only">
		::backdrop {
			background-image: linear-gradient(
				45deg,
				magenta,
				rebeccapurple,
				dodgerblue,
				green
			);
			opacity: 0.75;
		}

	</style>

	<form>

	<input type="text" id="input-popoverId" placeholder="input-popoverId">

		<br>

		<button type="button" popovertarget="popover">
			popover
		</button>
		<button type="button" popovertarget="popover-auto">
			popover-auto
		</button>
		<button type="button" popovertarget="popover-hint">
			popover-hint
		</button>
		<button type="button" popovertarget="popover-manual">
			popover-manual
		</button>
	</form>


	<div id="popover" popover>
		Popover plain
	</div>

	<div id="popover-auto" popover="auto">
		Popover auto
	</div>

	<div id="popover-hint" popover="hint">
		Popover hint
	</div>

	<div id="popover-manual" popover="manual">
		Popover manual
	</div>


	<!--
	<button type="button" onclick="document.getElementById('dialog1').show()">
		dialog show
	</button>

	<button type="button" onclick="document.getElementById('dialog1').showModal()">
		dialog showModal
	</button>
	-->

	<dialog id="dialog1" popover> <!-- open -->
		<p>dialog1: Greetings, one and all!</p>
		<form method="dialog">
			<button>OK</button>
		</form>
	</dialog>


	<dialog id="dialog2">
		<p>dialog2: Greetings, one and all!</p>
		<form method="dialog">
			<button>OK</button>
		</form>
	</dialog>

	</main>


</body>
</html>
