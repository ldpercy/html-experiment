<!doctype html>
<html lang="en">
<head>
	<title>File</title>
	<meta charset="utf-8">
	<link rel="icon" href="../[common]/html-experiment.svg">
	<link rel="stylesheet" href="../[common]/common-style.css">
	<script type="module" src="../[html-common]/script/colourScheme-selector.js"></script>
</head>
<body>
	<header>
		<h1><a href="">File</a></h1>
		<nav>
			<a class="colourScheme-selector" href="?colourScheme=light" title="Light colour scheme" data-colourscheme="light" data-colourschemespecial="rainbow">🟓</a>
			<a class="colourScheme-selector" href="?colourScheme=dark" title="Dark colour scheme" data-colourscheme="dark" data-colourschemespecial="disco">🟒</a>
			<a title="To folder" href="./">🖿</a>
			<a title="Parent folder" href="../">🡅</a>
		</nav>
	</header>

	<main>

		<style contenteditable="plaintext-only">
			label { display:block; margin:1em; }
			select { margin:1em; }
		</style>


		<form name="fileinput">
			<h2>input</h2>


			<input type="file" name="fileinput" id="input-fileinput">


			<textarea name="fileinput-textarea">
				file content goes here
			</textarea>

		</form>


		<form name="download">
			<h2>download</h2>

			<label>
				<a download href="data:text/plain;utf8,Some fantastic content to download">an 'a' element with a bare download attribute</a>
			</label>
			<label>
				<a download="" href="data:text/plain;utf8,Some fantastic content to download">an 'a' element with an empty download attribute</a>
			</label>
			<label>
				<a download="foo.text" href="data:text/plain;utf8,Some fantastic content to download" >an 'a' element with a suggested filename download attribute</a>
			</label>
			<label>
				<a download="~/foo.text" href="data:text/plain;utf8,Some fantastic content to download" >an 'a' element with a filepath download attribute</a>
			</label>


			<label>
				<a download="hash.text" href="data:text/plain;utf8,Hash right here:# after the hash" >'a' element with a hash in the href</a>
			</label>

			<label>
				<a download="hash.text" href="data:text/plain;utf8,Double hash:## after the double hash" >'a' element with double hash in the href</a>
			</label>

			<label>
				<a download="hash.text" href="data:text/plain;utf8,Hash right here:%23 after the hash" >'a' element with a percent encoded hash</a>
			</label>


			<label>
				<button type="button" onclick="document.getElementById('dummy-anchor').click()"> trigger file download  </button>
				<a id="dummy-anchor" download="~/foo.text" href="data:text/plain;utf8,Some fantastic content to download" >an anchor setup to be triggered </a>
			</label>

		</form>


		<script type="module">
			import { HTMLApp } from "../[html-common]/module/HTMLApp.js";

			class FileApp extends HTMLApp {
				appName = "FileApp";
				appInfo = [`%c
					File App 0.0.1 by ldpercy
					`.replace(/\n\t\t/g,'\n'),
					'color:light-dark(darkblue, lightblue);'
				];

				eventListeners = [
					// {
					// 	query: '#myForm',
					// 	type: 'change',
					// 	listener: this.formChangeListener
					// },
					{
						query: '#input-fileinput',
						type: 'change',
						listener: this.fileInputChangeListener
					},
					{
						query: '.colourScheme-selector',
						type: 'click',
						listener: this.colourSchemeListener
					},
					{
						query: '.colourScheme-selector',
						type: 'dblclick',
						listener: this.colourSchemeSpecialListener
					},
				];


				fileInputChangeListener(event) {
					//console.log('fileChangeListener event', event);
					//console.log('fileChangeListener event.target', event.target);
					//console.log('fileInputChangeListener event.target.files', event.target.files);

					const fileObj = event.target.files[0];

					console.log('event.target.files[0].file()', fileObj);

					//document.forms['fileinput']['fileinput-textarea'].value = fileObj.text();
					//console.log(fileObj.text());		// ugh promise


					const reader = new FileReader();

					reader.addEventListener(
						"load",
						() => {
							// this will then display a text file
							//content.innerText = reader.result;
							document.forms['fileinput']['fileinput-textarea'].value = reader.result;
						},
						false,
					);

					if (fileObj) {
						reader.readAsText(fileObj);
					}

				}/* fileInputChangeListener */


				formChangeListener(event) {
					console.log('formChangeListener event', event);
					console.log('formChangeListener event.target', event.target);
				}

				colourSchemeListener(event) {
					//console.log('colourSchemeListener', event.target.dataset);
					event.preventDefault();
					this.setColourScheme(event.target.dataset.colourscheme);
				}

				colourSchemeSpecialListener(event) {
					//console.log('colourSchemeListener', event.target.dataset);
					event.preventDefault();
					this.setColourScheme(event.target.dataset.colourschemespecial);

				}

			}/* ExampleApp */

			var fileApp = new FileApp();
		</script>



	</main>


</body>
</html>
