
<!doctype html>
<html lang="en">
<head>
	<title>list</title>
	<meta charset="utf-8">
	<link rel="icon" href="../favicon.svg">
	<link rel="stylesheet" href="../[common]/common-style.css">
	<script type="module" src="../[html-common]/script/colourScheme-selector.js"></script>
</head>
<body>
	<header>
		<h1>list</h1>
		<nav>
			<a class="colourScheme-selector" href="?colourScheme=light" title="Light colour scheme" data-colourscheme="light">🟓</a>
			<a class="colourScheme-selector" href="?colourScheme=dark" title="Dark colour scheme" data-colourscheme="dark">🟒</a>
			<a title="To folder" href="./">🖿</a>
			<a title="Parent folder" href="../">🡅</a>
		</nav>
	</header>

	<main>
		<style contenteditable="plaintext-only">

			ol { background-color: hsl( from lime h s l / 50%) }
			ul { background-color: hsl( from lavender h s l / 50%) }


			ol {
				list-style: none;
				counter-increment: start -1;

				li:before {
					content: counter(start, decimal-leading-zero) " ";
					counter-increment: start;

				}
			}

		</style>


		<section>

			<ul>
				<li>abcd</li>
				<li>efgh</li>
				<li>ijkl</li>
				<li>mnop</li>
				<li>qrst</li>
				<li>uvwx</li>
				<li>yz</li>
			</ul>

			<ol>
				<li>abcd</li>
				<li>efgh</li>
				<li>ijkl</li>
				<li>mnop</li>
				<li>qrst</li>
				<li>uvwx</li>
				<li>yz</li>
			</ol>


		</section>



	</main>


</body>
</html>
