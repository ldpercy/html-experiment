<body>
	<header>
		<h1><a href="">Element style</a></h1>
		<nav>
			<a class="colourScheme-selector" href="?colourScheme=light" title="Light colour scheme" data-colourScheme="light">🟓</a>
			<a class="colourScheme-selector" href="?colourScheme=dark" title="Dark colour scheme" data-colourScheme="dark">🟒</a>
			<a title="To folder" href="./">🖿</a>
			<a title="Parent folder" href="../">🡅</a>
		</nav>
	</header>


	<main>
		<script>
			// asdf
		</script>

		<style contenteditable="plaintext-only">

				main {
					script, style {
						grid-column-start: span 2;
					}
					&>* {
					margin:inherit;
					border-radius:inherit;
					grid-column-start: span 1;
	}
				}


				div		{ --colour: dodgerblue; }
				p		{ --colour: plum; }
				section	{ --colour: springgreen; }
				aside	{ --colour: aqua; }

				div, p, section, aside {
					border: 2px solid var(--colour);
					background-color: hwb(from var(--colour) h w b / 0.3);
				}

		</style>

		<a>a</a>
		<abbr>abbr</abbr>
		<address>address</address>

		<article>article</article>
		<aside>aside</aside>
		<audio>audio</audio>
