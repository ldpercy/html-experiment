<!doctype html>
<html lang="en">
<head>
	<title>flexbox</title>
	<meta charset="utf-8">
	<link rel="icon" href="../favicon.svg">
	<link rel="stylesheet" href="../[common]/common-style.css">
	<script type="module" src="../[html-common]/script/colourScheme-selector.js"></script>
</head>
<body>
	<header>
		<h1><a href="">flexbox</a></h1>
		<nav>
			<a class="colourScheme-selector" href="?colourScheme=light" title="Light colour scheme" data-colourscheme="light">🟓</a>
			<a class="colourScheme-selector" href="?colourScheme=dark" title="Dark colour scheme" data-colourscheme="dark">🟒</a>
			<a title="To folder" href="./">🖿</a>
			<a title="Parent folder" href="../">🡅</a>
		</nav>
	</header>

	<link rel="stylesheet" href="../[common]/visible-attributes.css">

	<main>


	<style contenteditable="plaintext-only" spellcheck="false">

		section {
			--element-colour: steelblue;
			border: 2px solid var(--element-colour);
		}

		section > div {
			display: flex;
			--element-colour:floralwhite;
			background-color: var(--element-colour);
		}


		#box1 div {
			align-content: stretch;
			justify-content: space-around;
			flex-direction: column;
		}

		#box2 div {
			gap: 1em;
		}

		#box3 div  {
			flex:1;
			margin:1em;
		}

		#box4 div {
			* { flex:1; }
		}

		#box5 div {
			justify-content: space-between;
			flex: 1;
			gap: 1em;
		}


	</style>

	<section id="box1">
		<div class="pretty" >
			<div>abcd</div>
			<div>efgh</div>
			<p>ijkl</p>

			<section>mnop</section>
			<aside>qrst</aside>
			<div>uvwx</div>
			<div>yz</div>
		</div>
	</section>

	<section id="box2">
		<div class=" pretty " >
			<div>abcd</div>
			<div>efgh</div>
			<p>ijkl</p>

			<section>mnop</section>
			<aside>qrst</aside>
			<div>uvwx</div>
			<div>yz</div>
		</div>
	</section>

	<section id="box3">
		<div class=" pretty " >
			<div>abcd</div>
			<div>efgh</div>
		</div>
	</section>

	<section id="box4">
		<div class=" pretty ">
			<div>abcd</div>
			<div>efgh</div>
			<p>ijkl</p>

			<section>mnop</section>
			<aside>qrst</aside>
			<div>uvwx</div>
			<div>yz</div>
		</div>
	</section>

	<section id="box5">
		<div class=" pretty flex1" >
			<div>abcd</div>
			<div>efgh</div>
		</div>
	</section>

	<section>
		<form>
			<label for="input-abcd">abcd</label>
			<input id="input-abcd" type="text" name="text"/>
			<label for="input-efgh">efgh</label>
			<input id="input-efgh" type="date" name="date"/>
			<label for="input-ijkl">ijkl</label>
			<select id="input-ijkl" name="date">
				<option>123</option>
				<option>456</option>
				<option>789</option>
			</select>
			<label for="input-tyui">abcd</label>
			<input id="input-tyui" type="text" name="text"/>
		</form>
	</section>

	</main>

</body>
</html>
