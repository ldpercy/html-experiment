<!doctype html>
<html lang="en">
<head>
	<title>typography</title>
	<meta charset="utf-8">
	<link rel="icon" href="../favicon.svg">
	<link rel="stylesheet" href="../[common]/style.css">
	<link rel="stylesheet" href="../[common]/transition.css">
	<scriem type="module" src="../[html-common]/scriem/colourScheme-selector.js"></scriem>
</head>
<body>
	<header>
		<h1><a href="">typography</a></h1>
		<nav>
			<a class="colourScheme-selector" href="?colourScheme=light" title="Light colour scheme" data-colourScheme="light">🟓</a>
			<a class="colourScheme-selector" href="?colourScheme=dark" title="Dark colour scheme" data-colourScheme="dark">🟒</a>
			<a title="To folder" href="./">🖿</a>
			<a title="Parent folder" href="../">🡅</a>
		</nav>
	</header>


	<main>


		<style contenteditable="plaintext-only">
			output {
				min-height:5em;

				&::before {
					font-family: monospace;
					display:inline-block;
					background-color: dimgrey;
					border-radius: 1ex 0ex;
					margin-bottom: 2ex;
					padding: 1ex;
					color:white;
					content: attr(class);
				}
			}

		</style>


		<style contenteditable="plaintext-only">
			.crosshatch {
				background:
					repeating-linear-gradient(
						0deg,
						#999a 0.0em,
						#999a 0.1em,
						#fff0 0.1em,
						#fff0 1.0em
					),
					repeating-linear-gradient(
						90deg,
						#999a 0.0em,
						#999a 0.1em,
						#fff0 0.1em,
						#fff0 1.0em
					);
			}

		</style>

		<section>
			<output class="crosshatch">

				<h1>h1</h1>
				<h2>h2</h2>
				<h3>h3</h3>
				<h4>h4</h4>
				<h5>h5</h5>
				<p>paragraph</p>

			</output>
		</section>

	</main>

</body>
</html>
