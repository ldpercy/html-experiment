<!doctype html>
<html lang="en">
<head>
	<title>colour</title>
	<meta charset="utf-8">
	<link rel="icon" href="../favicon.svg">
	<link rel="stylesheet" href="../[common]/common-style.css">
	<link rel="stylesheet" href="../[common]/transition.css">
	<link rel="stylesheet" href="../[common]/background.css">
	<script defer src="../[common]/common-script.js"></script>
	<script type="module" src="../[html-common]/script/colourScheme-selector.js"></script>

</head>
<body onload="loadColour();">
	<header>
		<h1><a href="">Colour</a></h1>
		<nav>
			<a class="colourScheme-selector" href="?colourScheme=light" title="Light colour scheme" data-colourScheme="light">🟓</a>
			<a class="colourScheme-selector" href="?colourScheme=dark" title="Dark colour scheme" data-colourScheme="dark">🟒</a>
			<a title="To folder" href="./">🖿</a>
			<a title="Parent folder" href="../">🡅</a>
		</nav>
	</header>

	<main>




		<form onchange="generateSwatches();" class="fullwidth">
			<h2>Settings</h2>
			<label>
				Colour chooser
				<input type="color" id="input-colourChooser" onchange="document.getElementById('input-colourText').value=this.value">
			</label>
			<label>
				Colour text
				<input type="text" id="input-colourText" onchange="document.getElementById('input-colourChooser').value=this.value">
			</label>
			<label>
				Channel divisions
				<input type="number" id="input-divisions" min="2" max="12" step="1" value="5">
			</label>

			<label>
				<button type="button" onclick="setColour(randomColourHex());">🎲 random colour</button>
			</label>

		</form>

		<output class="fullwidth">
			<h2>sRGB</h2>
			<h3>RGB — red, green, blue</h3>
			<div class="swatches background-crosshatch" id="swatchesRGB"></div>
			<h3>HSL — hue, saturation, lightness</h3>
			<div class="swatches background-crosshatch" id="swatchesHSL"></div>
			<h3>HWB — hue, whiteness, blackness</h3>
			<div class="swatches background-crosshatch" id="swatchesHWB"></div>

			<h2>CIELAB</h2>
			<h3>Lab — lightness, red/green, blue/yellow</h3>
			<div class="swatches background-crosshatch" id="swatchesLab"></div>
			<h3>LCH — lightness, chroma, hue</h3>
			<div class="swatches background-crosshatch" id="swatchesLCH"></div>

		</output>

		<script class="limit-height">
			function loadColour() {
				let colour = getUrlParameter('colour');
				if (!colour) {
					colour = randomColourHex();
				}
				setColour(colour);
			}

			function setColour(colour) {
				document.getElementById('input-colourText').value = colour;
				document.getElementById('input-colourChooser').value = colour;
				generateSwatches();
			}


			function generateSwatches() {
				const colour = document.getElementById('input-colourText').value;
				const divisions = document.getElementById('input-divisions').value;

				document.getElementById('swatchesRGB').innerHTML = generateColourSpaceSwatches(colour, colourSpace['RGB'], divisions);
				document.getElementById('swatchesHSL').innerHTML = generateColourSpaceSwatches(colour, colourSpace['HSL'], divisions);
				document.getElementById('swatchesHWB').innerHTML = generateColourSpaceSwatches(colour, colourSpace['HWB'], divisions);
				document.getElementById('swatchesLab').innerHTML = generateColourSpaceSwatches(colour, colourSpace['Lab'], divisions);
				document.getElementById('swatchesLCH').innerHTML = generateColourSpaceSwatches(colour, colourSpace['LCH'], divisions);

			}
		</script>

		<style contenteditable="plaintext-only"  class="limit-height">

			.swatches {
				font-family:monospace;
				div {
					display: flex;
  					justify-content: space-evenly;
				}
				span {
					display:inline-block;
					width: 100%;
					padding:2em;
					border-radius:1ex;
				}
				/* .channelTitle { width: 15em; } */
			}
		</style>

		<script class="fullwidth">
			const colourSpace = {};


			colourSpace['RGB'] = {
				name: 'rgb',		// red, green blue
				channel : [
					{ name: 'r',	type: 'linear',	min : 0,	max : 255 },
					{ name: 'g',	type: 'linear',	min : 0,	max : 255 },
					{ name: 'b',	type: 'linear',	min : 0,	max : 255 },
				]
			};


			colourSpace['HSL'] = {
				name: 'hsl',		// hue, saturation, lightness
				channel : [
					{ name: 'h',	type: 'polar',	min : 0,	max : 360 },
					{ name: 's',	type: 'linear',	min : 0,	max : 100 },
					{ name: 'l',	type: 'linear',	min : 0,	max : 100 },
				]
			};

			colourSpace['HWB'] = {
				name : 'hwb',		// hue, whiteness, blackness
				channel : [
					{ name: 'h',	type: 'polar',	min : 0,	max : 360 },
					{ name: 'w',	type: 'linear',	min : 0,	max : 100 },
					{ name: 'b',	type: 'linear',	min : 0,	max : 100 },
				]
			};

			colourSpace['Lab'] = {
				name : 'lab',		// lightness, red/green axis, blue/yellow axis
				channel : [
					{ name: 'l',	type: 'linear',	min : 0,	max : 100 },
					{ name: 'a',	type: 'linear',	min : -125,	max : 125 },
					{ name: 'b',	type: 'linear',	min : -125,	max : 125 },
				],
			};

			colourSpace['LCH'] = {
				name : 'lch',		// lightness, chroma, hue
				channel : [
					{ name: 'l',	type: 'linear',	min : 0,	max : 100 },
					{ name: 'c',	type: 'linear',	min : 0,	max : 150 },
					{ name: 'h',	type: 'polar',	min : 0,	max : 360 },
				]
			};


			/** generateColourSpaceSwatches
			 * @param {string} colour
			 * @param {string} colourSpace
			 * @param {number} divisions
			 */
			function generateColourSpaceSwatches(colour, colourSpace, divisions) {
				let result = '';
				let step = 0;

				const channelSwatches = colourSpace.channel.map(
					(channel) => {
						let step = (channel.max - channel.min) / divisions;
						let channelSwatches = '';

						for (let i=0; i<=divisions; i++) {
							let val = channel.min + (i * step);

							let swatchMap = colourSpace.channel.map(
								(swatchChannel) => {
									let channelItem = '';
									if (swatchChannel !== channel) {
										channelItem = swatchChannel.name;
									}
									else if (channel.type === 'polar') {
										channelItem	= `calc(${swatchChannel.name} + ${val.toFixed(2)})`;
									}
									else {
										channelItem = `${val.toFixed(2)}`;
									}

									return channelItem;
								}
							);

							colourString = `${colourSpace.name}(from ${colour} ${swatchMap.join(' ')} / alpha)`;
							channelSwatches += `<span style="background-color: ${colourString};">${colourString}</span>`;
						}

						//
						let channelResult = `
							<div title="channel:${channel.name}; step:${step};">
								${channelSwatches}
							</div>
						`;
						return channelResult;
					}

				);

				result = channelSwatches.join(' ');
				return result;
			}/* generateColourSpaceSwatches */



		</script>


	</main>

</body>
</html>
