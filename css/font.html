<!doctype html>
<html lang="en">
<head>
	<title>font</title>
	<meta charset="utf-8">
	<link rel="icon" href="../favicon.svg">
	<script type="module" src="../[html-common]/script/colourScheme-selector.js"></script>
</head>
<body>
	<header>
		<h1><a href="">font</a></h1>
		<nav>
			<a class="colourScheme-selector" href="?colourScheme=light" title="Light colour scheme" data-colourScheme="light">🟓</a>
			<a class="colourScheme-selector" href="?colourScheme=dark" title="Dark colour scheme" data-colourScheme="dark">🟒</a>
			<a title="To folder" href="./">🖿</a>
			<a title="Parent folder" href="../">🡅</a>
		</nav>
	</header>

	<link rel="stylesheet" href="../[common]/style.css">

	<main>

		<form>
			<label>base unit length (px)</label>
			<input type="number" min="1" max="128" value="20" onchange="document.documentElement.style.setProperty('--base-unit',`${this.value}px`)">

			<label>vertical align</label>
			<select size="4">
				<option>baseline</option>
				<option>top</option>
				<option>middle</option>
				<option>bottom</option>
				<option>sub</option>
				<option>text-top</option>
			</select>
		</form>

		<style contenteditable="plaintext-only" spellcheck="false">
			:root	{	--base-unit: 20px; }

			output p {
				display: inline-block;
				outline: 1px dotted hotpink;

				margin-block: calc(1.0 * var(--base-unit));
				margin-inline: calc(1.0 * var(--base-unit));

				font-family:serif;
				font-size: calc(2.0 * var(--base-unit));
				line-height: calc(3.0 * var(--base-unit));

				font-size-adjust:  ex-height 0.5;

				vertical-align: baseline;


				alignment-baseline: baseline;			/* not working for me */
				/* baseline | alphabetic | ideographic | middle | central | mathematical | text-before-edge | text-after-edge */

				white-space-collapse: collapse;			/* chrome overrides this */
			}
		</style>


		<section class="full-width">
			<div class="wrapper">
				<output class="emgrid">
					<!-- chrome overrides white-space-collapse when contenteditable is on -->
					<p contenteditable="plaintext-only" spellcheck="false">paragraph - ABCDEFGHIJKLM NOPQRSTUVWXYZ abcdefghijklm nopqrstuvwxyz</p>
				</output>
			</div>
		</section>


		<style contenteditable="plaintext-only" spellcheck="false" class="maxHeight-small">

			output {

				display:block;
				resize: both;
				overflow: auto;

				transition: font-size 0.5s linear;

				min-height:5em;

				h1, h2, h3, h4, h5, h6, p {
					background-color:hsl(from lemonchiffon h s l / 0.5);
				}
			}

			.emgrid {
				background-position-x: left;
				background-position-y: 0px;
				--line-colour: hsl(from var(--text-colour) h s l / 0.2);
				--back-colour: #f000;

				background-image:
					repeating-linear-gradient(
						to bottom,
						var(--line-colour) calc(0.0 * var(--base-unit)),
						var(--line-colour) calc(0.1 * var(--base-unit)),
						var(--back-colour) calc(0.1 * var(--base-unit)),
						var(--back-colour) calc(1.0 * var(--base-unit))
					),
					repeating-linear-gradient(
						to right,
						var(--line-colour) calc(0.0 * var(--base-unit)),
						var(--line-colour) calc(0.1 * var(--base-unit)),
						var(--back-colour) calc(0.1 * var(--base-unit)),
						var(--back-colour) calc(1.0 * var(--base-unit))
					);
			}

			section {
				--element-colour: steelblue;
				/* grid-column-start: span 4; */
				div {
					background-color: var(--scheme-colour);
				}
			}

			form {
				display:grid;
				select, input {
					text-align: center;
				}

			}
		</style>

	</main>

</body>
</html>
