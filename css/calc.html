<!doctype html>
<html lang="en">
<head>
	<title>calc</title>
	<meta charset="utf-8">
	<link rel="icon" href="../favicon.svg">
	<link rel="stylesheet" href="../[common]/common-style.css">
</head>
<body>
	<header>
		<h1><a href="">calc</a></h1>
		<nav>
			<a class="colourScheme-selector" href="?colourScheme=light" title="Light colour scheme" data-colourscheme="light">🟓</a>
			<a class="colourScheme-selector" href="?colourScheme=dark" title="Dark colour scheme" data-colourscheme="dark">🟒</a>
			<a title="To folder" href="./">🖿</a>
			<a title="Parent folder" href="../">🡅</a>
		</nav>
	</header>

	<main>

	<style contenteditable="plaintext-only" spellcheck="false">
		.value-1 { --value: 1; }
		.value-2 { --value: 2; }
		.value-3 { --value: 3; }
		.value-4 { --value: 4; }
		.value-5 { --value: 5; }
		.value-6 { --value: 6; }
		.value-7 { --value: 7; }
		.value-8 { --value: 8; }
		.value-9 { --value: 9; }

		.digit {
			div {
				width: 5ex;
				height: 5ex;
				/* margin-left: attr(data-value); */
				/* margin-left: calc(var(--value) *10ex); */

				--margin-left: calc(var(--value) *10ex);
				--margin-boundary: 50ex;
				margin-left: max(var(--margin-boundary), var(--margin-left));
			}
		}

		:root {
			/* which may or may not be defined*/
			--global-colour : gainsboro;
			--bg-colour: pink;
		}

		section {

			p {
				--bg-colour: var(--bg-colour, fuchsia);	/* does not work, yields undefined */
				background-color: var(--bg-colour);
			}
		}
	</style>

	<output class="digit pretty" data-digit="${digit}">
		<div class="value-1" data-value="1">1</div>
		<div class="value-2" data-value="2">2</div>
		<div class="value-3" data-value="3">3</div>
		<div class="value-4" data-value="4">4</div>
		<div class="value-5" data-value="5ex">5</div>
		<div class="value-6" data-value="6">6</div>
		<div class="value-7" data-value="7">7</div>
		<div class="value-8" data-value="8">8</div>
		<div class="value-9" data-value="9">9</div>
	</output>


	<pre>
		Q: Can you define a var self-referentially?
		Answer: No, not like i've done above at least.
		Could prob use `if()`, but not available in ff yet.
	</pre>

	<section>
		<p>
			some text
		</p>
		<p>
			some more text
		</p>
	</section>




	</main>

</body>
</html>
